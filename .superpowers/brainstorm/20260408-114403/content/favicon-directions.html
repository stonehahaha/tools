<style>
  .cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .card {
    border: 1px solid #d8dee9;
    border-radius: 18px;
    overflow: hidden;
    background: #ffffff;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(35, 51, 92, 0.12);
    border-color: #8ea2ff;
  }
  .card-image {
    background: linear-gradient(145deg, #edf2ff 0%, #f8fbff 100%);
    padding: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-body {
    padding: 18px 18px 16px;
  }
  .card-body h3 {
    margin: 0 0 6px;
    font-size: 18px;
  }
  .card-body p {
    margin: 0;
    color: #5d6885;
    line-height: 1.45;
    font-size: 14px;
  }
  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .pill {
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 5px 8px;
    border-radius: 999px;
    background: #f0f4ff;
    color: #5166b7;
  }
  .note {
    margin-top: 18px;
    color: #5d6885;
    font-size: 14px;
  }
  .ico {
    width: 140px;
    height: 140px;
    border-radius: 32px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }
</style>

<h2>网站图标方向</h2>
<p class="subtitle">我把它收敛成更适合标签页的小图标。看的是缩小后识别度，不是大图细节。</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg class="ico" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="140" height="140" rx="32" fill="url(#g1)"/>
        <rect x="26" y="30" width="26" height="26" rx="7" fill="white" fill-opacity="0.96"/>
        <rect x="58" y="30" width="26" height="26" rx="7" fill="white" fill-opacity="0.82"/>
        <rect x="90" y="30" width="24" height="26" rx="7" fill="white" fill-opacity="0.68"/>
        <rect x="26" y="62" width="18" height="18" rx="5" fill="#F6D365"/>
        <rect x="50" y="62" width="18" height="18" rx="5" fill="#F6D365"/>
        <rect x="74" y="62" width="18" height="18" rx="5" fill="#F6D365"/>
        <rect x="98" y="62" width="18" height="18" rx="5" fill="#F6D365"/>
        <path d="M30 103H110" stroke="white" stroke-width="10" stroke-linecap="round"/>
        <circle cx="44" cy="103" r="6" fill="#8EA2FF"/>
        <circle cx="70" cy="103" r="6" fill="#8EA2FF"/>
        <circle cx="96" cy="103" r="6" fill="#8EA2FF"/>
        <defs>
          <linearGradient id="g1" x1="15" y1="12" x2="124" y2="131" gradientUnits="userSpaceOnUse">
            <stop stop-color="#667EEA"/>
            <stop offset="1" stop-color="#7C5CFF"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="card-body">
      <h3>A. 数据块</h3>
      <p>把“数据表格 + 归并”抽成几块方格，最稳，缩到标签页后也容易认。</p>
      <div class="meta">
        <span class="pill">稳</span>
        <span class="pill">清晰</span>
      </div>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg class="ico" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="140" height="140" rx="32" fill="url(#g2)"/>
        <path d="M40 38H100" stroke="white" stroke-width="10" stroke-linecap="round"/>
        <path d="M40 70H100" stroke="white" stroke-width="10" stroke-linecap="round"/>
        <path d="M40 102H100" stroke="white" stroke-width="10" stroke-linecap="round"/>
        <circle cx="40" cy="38" r="10" fill="#FFD166"/>
        <circle cx="100" cy="70" r="10" fill="#FFD166"/>

        <defs>
          <linearGradient id="g2" x1="18" y1="10" x2="122" y2="130" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0EA5E9"/>
            <stop offset="1" stop-color="#22C55E"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="card-body">
      <h3>B. 流程线</h3>
      <p>强调“输入数据 -> 处理 -> 输出结果”，更像工具站，但比 A 更细一点。</p>
      <div class="meta">
        <span class="pill">流程感</span>
        <span class="pill">技术味</span>
      </div>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg class="ico" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="140" height="140" rx="32" fill="url(#g3)"/>
        <rect x="30" y="26" width="80" height="88" rx="20" fill="white" fill-opacity="0.92"/>
        <rect x="43" y="40" width="14" height="14" rx="4" fill="#111827"/>
        <rect x="63" y="40" width="14" height="14" rx="4" fill="#111827"/>
        <rect x="83" y="40" width="14" height="14" rx="4" fill="#111827"/>

        <rect x="63" y="60" width="14" height="14" rx="4" fill="#F97316"/>
        <rect x="83" y="60" width="14" height="14" rx="4" fill="#111827"/>
        <path d="M43 90H97" stroke="#111827" stroke-width="9" stroke-linecap="round"/>
        <path d="M70 82V106" stroke="#F97316" stroke-width="9" stroke-linecap="round"/>
        <defs>
          <linearGradient id="g3" x1="14" y1="12" x2="124" y2="127" gradientUnits="userSpaceOnUse">

    <div class="card-body">
      <h3>C. 中央核心</h3>
      <p>更像“处理中枢”，记忆点强，但风格比前两种更硬朗。</p>
      <div class="meta">
        <span class="pill">强识别</span>
        <span class="pill">偏品牌</span>
      </div>
    </div>
  </div>
</div>
